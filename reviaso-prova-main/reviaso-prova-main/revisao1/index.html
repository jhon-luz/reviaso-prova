<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu com Flexbox</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Menu usando Flexbox */
        .menu{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 20px;
        }

        /* Logo */
        .logo{
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        /* Links */
        .links{
            display: flex;
            gap: 20px;
        }

        .links a{
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .links a:hover{
            color: lightblue;
        }

        /* Responsividade */
        @media (max-width:768px){

            .menu{
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .links{
                flex-direction: column;
                align-items: center;
                margin-top: 15px;
            }
        }
    </style>

</head>
<body>

    <nav class="menu">
        <div class="logo">LOGO</div>

        <div class="links">
            <a href="#">Início</a>
            <a href="#">Últimas</a>
            <a href="#">Contato</a>
        </div>
    </nav>

</body>
</html>
