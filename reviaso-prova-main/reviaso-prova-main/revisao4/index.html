<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Flexbox</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        header{
            background-color: #3498db;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav{
            background-color: #2ecc71;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container{
            display: flex;
        }

        main{
            flex: 3;
            background-color: #ecf0f1;
            padding: 40px;
            text-align: center;
        }

        aside{
            flex: 1;
            background-color: #f39c12;
            padding: 40px;
            text-align: center;
        }

        footer{
            background-color: #34495e;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* Responsivo */
        @media(max-width:768px){

            .container{
                flex-direction: column;
            }

        }

    </style>

</head>
<body>

    <header>
        <h1>Header</h1>
    </header>

    <nav>
        <h2>Menu</h2>
    </nav>

    <div class="container">

        <main>
            <h2>Conteúdo</h2>
            <p>Área principal do site.</p>
        </main>

        <aside>
            <h2>Sidebar</h2>
            <p>Barra lateral.</p>
        </aside>

    </div>

    <footer>
        <h2>Rodapé</h2>
    </footer>

</body>
</html>
