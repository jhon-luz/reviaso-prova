<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Responsivo</title>

    <style>
        body{
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background-color: #f2f2f2;
        }

        header{
            background-color: #333;
            padding: 18px 25px;
        }

        .barra{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .titulo{
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        ul{
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        li{
            margin-left: 20px;
        }

        a{
            color: white;
            text-decoration: none;
            font-size: 17px;
            transition: 0.3s;
        }

        a:hover{
            color: #ffd54f;
        }

        @media screen and (max-width: 768px){

            .barra{
                flex-direction: column;
            }

            ul{
                flex-direction: column;
                margin-top: 15px;
                text-align: center;
                width: 100%;
            }

            li{
                margin: 8px 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="barra">
            <div class="titulo">Menu com Flexbox</div>

            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Serviços</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </div>
    </header>

</body>
</html>
