<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrutura do Site</title>

    <style>

        body{
            margin: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            background: #f5f5f5;
        }

        .topo{
            background: #1565c0;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .menu{
            background: #388e3c;
            text-align: center;
            padding: 18px;
        }

        .menu a{
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
        }

        .principal{
            display: flex;
            min-height: 350px;
        }

        .conteudo{
            flex: 2;
            background: white;
            padding: 30px;
        }

        .lateral{
            flex: 1;
            background: #ffe082;
            padding: 30px;
        }

        .rodape{
            background: #424242;
            color: white;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 700px){

            .principal{
                flex-direction: column;
            }

            .menu a{
                display: block;
                margin: 10px 0;
            }

        }

    </style>

</head>
<body>

    <div class="topo">
        <h1>Meu Site</h1>
    </div>

    <div class="menu">
        <a href="#">Início</a>
        <a href="#">Produtos</a>
        <a href="#">Contato</a>
    </div>

    <div class="principal">

        <div class="conteudo">
            <h2>Conteúdo Principal</h2>
            <p>
                Aqui fica o conteúdo da página. Esse espaço pode conter textos,
                imagens, notícias ou qualquer outra informação importante.
            </p>
        </div>

        <div class="lateral">
            <h2>Sidebar</h2>
            <p>
                Área destinada para avisos, links rápidos ou publicidade.
            </p>
        </div>

    </div>

    <div class="rodape">
        <p>© 2026 - Todos os direitos reservados.</p>
    </div>

</body>
</html>
