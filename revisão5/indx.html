<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Responsivo</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #ececec;
        }

        .formulario{
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        .linha{
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .campo{
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 5px;
            font-weight: bold;
        }

        input{
            padding: 10px;
            border: 1px solid #999;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover{
            background: #0d47a1;
        }

        @media (max-width: 768px){

            .linha{
                flex-direction: column;
            }

        }

    </style>

</head>
<body>

    <div class="formulario">

        <h2>Cadastro</h2>

        <form>

            <div class="linha">

                <div class="campo">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail">
                </div>

            </div>

            <div class="linha">

                <div class="campo">
                    <label>Telefone</label>
                    <input type="tel" placeholder="(00) 00000-0000">
                </div>

                <div class="campo">
                    <label>Cidade</label>
                    <input type="text" placeholder="Sua cidade">
                </div>

            </div>

            <button type="submit">Enviar</button>

        </form>

    </div>

</body>
</html>
