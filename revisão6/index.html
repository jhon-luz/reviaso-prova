<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container x Container Fluid</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container bg-primary text-white p-4 mt-4">
    <h2>Exemplo com .container</h2>
    <p>
      Este bloco fica centralizado e possui uma largura máxima, deixando espaços nas laterais em telas maiores.
    </p>
  </div>

  <div class="container-fluid bg-success text-white p-4 mt-4">
    <h2>Exemplo com .container-fluid</h2>
    <p>
      Este bloco ocupa toda a largura disponível da tela, sem deixar margens nas laterais.
    </p>
  </div>

</body>
</html>
